<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Class</title>
</head>
<body>
    <h1 id="demo">This is the JS Class</h1>    
    <script>
        console.log("Variable Declaration and Initialization");
        var x= 10;
        var y= 20;
        console.log("The value of x: " + x);
        console.log("The value of y: " + y);

        var sum = x + y;
        console.log("The sum of x and y: " + sum);
        var name = "Ana";
        console.log("The name is: " + name);
        var name_2 = "John";
        console.log("The second name is: " + name_2);
        var hello;
        var hello_2= null;
        console.log(typeof x);
        console.log(typeof sum);
        console.log(typeof name);
        console.log(typeof hello);
        console.log(typeof hello_2);

        alert("Hello world");
        document.write("Hello World");
        var para =document.getElementById("demo");
        para.innerHTML = "This is also js";
    </script>
    <h2>Welcome to JavaScript</h2>

</body>
</html>
